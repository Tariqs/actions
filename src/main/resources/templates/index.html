<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>User Registration List</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 40px 16px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 28px;
            letter-spacing: -0.3px;
        }

        /* Card / Form */
        .card {
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 28px 32px;
            margin-bottom: 36px;
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            align-items: start;
        }

        @media (max-width: 620px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.82rem;
            font-weight: 500;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #2d3748;
            background: #f7fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
            background: #fff;
        }

        input.field-error {
            border-color: #e05c5c;
            background: #fff8f8;
        }

        .error-msg {
            font-size: 0.78rem;
            color: #e05c5c;
            margin-top: 2px;
        }

        .form-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-submit {
            padding: 10px 28px;
            background-color: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background-color: #3a7bc8;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Table section */
        .table-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 14px;
        }

        .table-wrapper {
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead tr {
            background-color: #4a90d9;
            color: #fff;
        }

        thead th {
            padding: 13px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr:nth-child(even) {
            background-color: #f0f4f8;
        }

        tbody tr:nth-child(odd) {
            background-color: #ffffff;
        }

        tbody tr:hover {
            background-color: #e8f0fb;
        }

        tbody td {
            padding: 12px 16px;
            color: #2d3748;
            border-bottom: 1px solid #e2e8f0;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .btn-delete {
            padding: 5px 14px;
            background-color: #e05c5c;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-delete:hover {
            background-color: #c94b4b;
        }

        .btn-delete:active {
            transform: scale(0.97);
        }

        .empty-msg {
            text-align: center;
            padding: 28px;
            color: #a0aec0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>User Form</h1>

    <!-- Form Card -->
    <div class="card">
        <h2>Add New User</h2>
        <form th:action="@{/submit}" th:object="${user}" method="post" novalidate>
            <div class="form-grid">

                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text"
                           id="username"
                           th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? 'field-error'"
                           placeholder="e.g. johndoe"
                           required/>
                    <span class="error-msg"
                          th:if="${#fields.hasErrors('username')}"
                          th:errors="*{username}"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email"
                           id="email"
                           th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'field-error'"
                           placeholder="e.g. john@example.com"
                           required/>
                    <span class="error-msg"
                          th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                </div>

                <!-- City -->
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text"
                           id="city"
                           th:field="*{city}"
                           th:classappend="${#fields.hasErrors('city')} ? 'field-error'"
                           placeholder="e.g. New York"
                           required/>
                    <span class="error-msg"
                          th:if="${#fields.hasErrors('city')}"
                          th:errors="*{city}"></span>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-submit">Submit</button>
            </div>
        </form>
    </div>

    <!-- Table Section -->
    <div class="table-section">
        <h2>Submitted Entries</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>City</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="5" class="empty-msg">No entries yet. Submit the form above to get started.</td>
                </tr>
                <tr th:each="u, stat : ${users}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.city}"></td>
                    <td>
                        <a th:href="@{/delete/{id}(id=${u.id})}" class="btn-delete">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
